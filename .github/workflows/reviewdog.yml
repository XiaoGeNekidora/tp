name: Code Quality

on:
  pull_request:
    branches: [ "master" ]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required so Reviewdog can leave comments

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Checkstyle
        # We use --continue to ensure all reports are generated even if errors are found
        run: ./gradlew checkstyleMain checkstyleTest --continue
        continue-on-error: true

      - name: Run Reviewdog
        uses: reviewdog/action-checkstyle@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Path where Gradle usually dumps the XML reports
          checkstyle_config: config/checkstyle/checkstyle.xml
          reporter: github-pr-review # Comments directly on the PR lines
          level: warning # Or 'error' if you want it to fail the build
          pattern: '**/build/reports/checkstyle/*.xml'